# Railway service settings for apps/whatsapp-bot
# In Railway UI:
#   Root Directory: apps/whatsapp-bot
#   Builder: Dockerfile
#   Dockerfile path: Dockerfile
#   Config file path: leave empty OR railway.toml (relative to root directory)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
